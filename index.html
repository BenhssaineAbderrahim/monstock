<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a1a2e">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MonStock">
<link rel="manifest" href="manifest.json">
<title>MonStock</title>
<style>
  :root {
    --bg: #0f0f1a;
    --bg2: #1a1a2e;
    --bg3: #16213e;
    --accent: #e94560;
    --accent2: #0f3460;
    --text: #eaeaea;
    --text2: #a0a0b0;
    --border: rgba(255,255,255,0.08);
    --card: #1e1e35;
    --green: #00d084;
    --radius: 16px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; }
  
  #app { display: flex; flex-direction: column; height: 100vh; height: 100dvh; }

  /* Header */
  header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 14px 20px 12px;
    display: flex; align-items: center; justify-content: space-between;
    flex-shrink: 0;
  }
  header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.5px; }
  header h1 span { color: var(--accent); }
  .badge { background: var(--accent); color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }

  /* Nav tabs */
  nav {
    display: flex; background: var(--bg2);
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  nav button {
    flex: 1; padding: 12px 0; border: none; background: none; color: var(--text2);
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  nav button svg { width: 20px; height: 20px; }
  nav button.active { color: var(--accent); border-bottom: 2px solid var(--accent); }

  /* Pages */
  .page { display: none; flex: 1; overflow-y: auto; padding: 16px; }
  .page.active { display: flex; flex-direction: column; gap: 14px; }

  /* Cards */
  .card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border); padding: 16px;
  }

  /* Mic button */
  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 12px; }
  .mic-btn {
    width: 80px; height: 80px; border-radius: 50%; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    background: var(--accent2); transition: all 0.2s; position: relative;
  }
  .mic-btn.listening {
    background: var(--accent);
    animation: pulse 1.2s ease-in-out infinite;
  }
  .mic-btn svg { width: 32px; height: 32px; fill: #fff; }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(233,69,96,0.5); }
    50% { box-shadow: 0 0 0 20px rgba(233,69,96,0); }
  }
  .mic-label { font-size: 13px; color: var(--text2); text-align: center; }
  .transcript-box {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; min-height: 48px;
    font-size: 15px; color: var(--text); width: 100%;
    font-style: italic; color: var(--text2);
  }
  .transcript-box.has-text { color: var(--text); font-style: normal; }

  /* Form fields */
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; }
  .field input {
    background: var(--bg3); border: 1px solid var(--border);
    border-radius: 10px; padding: 12px 14px; color: var(--text);
    font-size: 15px; outline: none; width: 100%;
    transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }

  /* Photo area */
  .photo-area {
    border: 2px dashed var(--border); border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    height: 130px; cursor: pointer; position: relative; overflow: hidden;
    transition: border-color 0.2s;
  }
  .photo-area:hover { border-color: var(--accent); }
  .photo-area img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
  .photo-area .photo-placeholder { display: flex; flex-direction: column; align-items: center; gap: 8px; color: var(--text2); font-size: 13px; }
  .photo-area .photo-placeholder svg { width: 32px; height: 32px; }
  #photo-input { display: none; }

  /* Buttons */
  .btn {
    border: none; border-radius: 12px; padding: 14px; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: all 0.15s; width: 100%;
  }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-primary:active { transform: scale(0.98); filter: brightness(0.9); }
  .btn-secondary { background: var(--bg3); color: var(--text); border: 1px solid var(--border); }
  .btn-row { display: flex; gap: 10px; }
  .btn-row .btn { flex: 1; }

  /* Search */
  .search-row { display: flex; gap: 10px; align-items: center; }
  .search-input-wrap { flex: 1; position: relative; }
  .search-input-wrap input {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 14px 12px 42px;
    color: var(--text); font-size: 15px; outline: none; width: 100%;
  }
  .search-input-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); }
  .search-mic { width: 48px; height: 48px; border-radius: 12px; border: none; cursor: pointer;
    background: var(--accent2); display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: background 0.2s; }
  .search-mic.listening { background: var(--accent); animation: pulse 1.2s ease-in-out infinite; }
  .search-mic svg { width: 22px; height: 22px; fill: #fff; }

  /* Product list */
  .product-list { display: flex; flex-direction: column; gap: 10px; }
  .product-card {
    background: var(--card); border-radius: var(--radius);
    border: 1px solid var(--border);
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px; cursor: pointer;
    transition: border-color 0.2s;
  }
  .product-card:active { border-color: var(--accent); }
  .product-thumb {
    width: 56px; height: 56px; border-radius: 10px;
    background: var(--bg3); flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
  }
  .product-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .product-thumb svg { width: 24px; height: 24px; color: var(--text2); }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-weight: 600; font-size: 15px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-price { color: var(--green); font-weight: 700; font-size: 16px; margin-top: 2px; }
  .product-date { color: var(--text2); font-size: 11px; margin-top: 2px; }
  .product-delete { padding: 8px; color: var(--text2); cursor: pointer; }
  .product-delete:active { color: var(--accent); }

  /* Empty state */
  .empty { display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 12px; padding: 48px 20px; color: var(--text2); text-align: center; }
  .empty svg { width: 48px; height: 48px; opacity: 0.4; }
  .empty p { font-size: 14px; }

  /* Toast */
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px);
    background: #1e1e35; border: 1px solid var(--border);
    color: var(--text); padding: 12px 24px; border-radius: 30px;
    font-size: 14px; font-weight: 500; z-index: 999;
    transition: transform 0.3s ease; white-space: nowrap;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { border-color: var(--green); color: var(--green); }
  .toast.error { border-color: var(--accent); color: var(--accent); }

  /* Section title */
  .section-title { font-size: 12px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.8px; }

  /* Price convert helper */
  .price-hint { font-size: 12px; color: var(--green); margin-top: 4px; }

  /* Step indicator */
  .steps { display: flex; gap: 8px; margin-bottom: 4px; }
  .step { flex: 1; height: 3px; border-radius: 2px; background: var(--border); }
  .step.done { background: var(--accent); }
  .step.active { background: rgba(233,69,96,0.5); }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* Modal overlay */
  .modal-overlay {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(0,0,0,0.75);
    display: flex; align-items: flex-end; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s ease;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--bg2); border-radius: 24px 24px 0 0;
    border: 1px solid var(--border); border-bottom: none;
    width: 100%; max-width: 520px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    overflow: hidden;
    max-height: 90dvh;
    display: flex; flex-direction: column;
  }
  .modal-overlay.open .modal { transform: translateY(0); }

  .modal-handle {
    width: 40px; height: 4px; border-radius: 2px;
    background: var(--border); margin: 12px auto 0;
    flex-shrink: 0;
  }

  .modal-photo {
    width: 100%; height: 220px; object-fit: cover;
    flex-shrink: 0;
  }
  .modal-photo-placeholder {
    width: 100%; height: 160px; background: var(--bg3);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .modal-photo-placeholder svg { width: 48px; height: 48px; color: var(--text2); opacity: 0.4; }

  .modal-body { padding: 20px 20px 32px; overflow-y: auto; }
  .modal-name {
    font-size: 22px; font-weight: 700; line-height: 1.2;
    margin-bottom: 8px; letter-spacing: -0.3px;
  }
  .modal-price {
    font-size: 32px; font-weight: 800; color: var(--green);
    letter-spacing: -1px; margin-bottom: 4px;
  }
  .modal-price span { font-size: 18px; font-weight: 500; }
  .modal-date { font-size: 12px; color: var(--text2); margin-bottom: 20px; }

  .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
  .modal-actions .btn { flex: 1; padding: 13px; font-size: 14px; }
  .btn-danger { background: rgba(233,69,96,0.15); color: var(--accent); border: 1px solid rgba(233,69,96,0.3); }
  .btn-danger:active { background: rgba(233,69,96,0.25); }
</style>
</head>
<body>
<div id="app">
  <header>
    <h1>Mon<span>Stock</span></h1>
    <div class="badge" id="count-badge">0 produits</div>
  </header>

  <nav>
    <button class="active" onclick="switchTab('add')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
      Ajouter
    </button>
    <button onclick="switchTab('search')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      Chercher
    </button>
    <button onclick="switchTab('list')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
      Tout le stock
    </button>
  </nav>

  <!-- ADD PAGE -->
  <div id="page-add" class="page active">
    <div class="steps">
      <div class="step done" id="step1"></div>
      <div class="step" id="step2"></div>
      <div class="step" id="step3"></div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:12px">📦 Nom du produit</div>
      <div class="mic-area">
        <button class="mic-btn" id="mic-name" onclick="startVoice('name')">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 0-4 4v7a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <div class="mic-label" id="mic-name-label">Appuyez pour dicter le nom</div>
      </div>
      <div id="transcript-name" class="transcript-box" style="margin-top:10px">En attente...</div>
      <div class="field" style="margin-top:12px">
        <label>Ou tapez le nom</label>
        <input type="text" id="input-name" placeholder="Ex: Espiro petite taille" oninput="updateFromInput('name')">
      </div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:12px">💰 Prix</div>
      <div class="mic-area">
        <button class="mic-btn" id="mic-price" onclick="startVoice('price')">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 0-4 4v7a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
        <div class="mic-label" id="mic-price-label">Appuyez pour dicter le prix</div>
      </div>
      <div id="transcript-price" class="transcript-box" style="margin-top:10px">En attente...</div>
      <div id="price-hint" class="price-hint"></div>
      <div class="field" style="margin-top:12px">
        <label>Ou tapez le prix (en DH)</label>
        <input type="number" id="input-price" placeholder="Ex: 500" oninput="updateStep()">
      </div>
    </div>

    <div class="card">
      <div class="section-title" style="margin-bottom:12px">📷 Photo (optionnel)</div>
      <div class="photo-area" id="photo-area" onclick="document.getElementById('photo-input').click()">
        <div class="photo-placeholder">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Ajouter une photo</span>
        </div>
      </div>
      <input type="file" id="photo-input" accept="image/*" capture="environment" onchange="handlePhoto(event)">
    </div>

    <div class="btn-row">
      <button class="btn btn-secondary" onclick="resetForm()">🔄 Réinitialiser</button>
      <button class="btn btn-primary" onclick="saveProduct()">✅ Sauvegarder</button>
    </div>
  </div>

  <!-- SEARCH PAGE -->
  <div id="page-search" class="page">
    <div class="card">
      <div class="section-title" style="margin-bottom:12px">🔍 Rechercher un produit</div>
      <div class="search-row">
        <div class="search-input-wrap">
          <span class="search-icon">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          </span>
          <input type="text" id="search-input" placeholder="Nom du produit..." oninput="doSearch()">
        </div>
        <button class="search-mic" id="search-mic-btn" onclick="startVoice('search')">
          <svg viewBox="0 0 24 24"><path d="M12 1a4 4 0 0 0-4 4v7a4 4 0 0 0 8 0V5a4 4 0 0 0-4-4z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
        </button>
      </div>
    </div>
    <div id="search-results" class="product-list"></div>
  </div>

  <!-- LIST PAGE -->
  <div id="page-list" class="page">
    <div class="section-title">Tous les produits</div>
    <div id="all-products" class="product-list"></div>
  </div>
</div>

<!-- Product Detail Modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div id="modal-photo-wrap"></div>
    <div class="modal-body">
      <div class="modal-name" id="modal-name"></div>
      <div class="modal-price" id="modal-price"></div>
      <div class="modal-date" id="modal-date"></div>
      <div class="modal-actions">
        <button class="btn btn-danger" id="modal-delete-btn" onclick="deleteFromModal()">🗑 Supprimer</button>
        <button class="btn btn-secondary" onclick="closeModal()">Fermer</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let products = JSON.parse(localStorage.getItem('monstock_products') || '[]');
let currentPhoto = null;
let recognition = null;
let activeVoiceTarget = null;

// ─── Event delegation for product cards ───────────────────────────────────────
document.addEventListener('click', (e) => {
  const delBtn = e.target.closest('[data-del]');
  if (delBtn) {
    e.stopPropagation();
    deleteProduct(parseInt(delBtn.dataset.del), e);
    return;
  }
  const card = e.target.closest('.product-card[data-id]');
  if (card) {
    openModal(parseInt(card.dataset.id));
  }
});

// ─── Word-to-number parser (French + Darija-friendly) ─────────────────────────
const wordMap = {
  zéro:0,zero:0,un:1,une:1,deux:2,trois:3,quatre:4,cinq:5,six:6,sept:7,huit:8,neuf:9,
  dix:10,onze:11,douze:12,treize:13,quatorze:14,quinze:15,seize:16,
  'dix-sept':17,'dix-huit':18,'dix-neuf':19,
  vingt:20,'vingt et un':21,'vingt-et-un':21,'vingt-deux':22,'vingt-trois':23,
  'vingt-quatre':24,'vingt-cinq':25,'vingt-six':26,'vingt-sept':27,'vingt-huit':28,'vingt-neuf':29,
  trente:30,'trente et un':31,'trente-et-un':31,'trente-deux':32,'trente-cinq':35,
  quarante:40,cinquante:50,soixante:60,
  'soixante-dix':70,'quatre-vingts':80,'quatre-vingt':80,'quatre-vingt-dix':90,
  cent:100,cents:100,mille:1000,million:1000000,
  // Darija / Arabic-influenced
  wahd:1,jouj:2,tlata:3,rbaa:4,khamsa:5,stta:6,sbaa:7,tmnya:8,tsoud:9,ashra:10,
  miyya:100,miya:100,alf:1000,
};

function parsePrice(text) {
  if (!text) return null;
  text = text.toLowerCase().trim();
  // Already a number?
  let direct = parseFloat(text.replace(/[^0-9.]/g,''));
  if (!isNaN(direct) && direct > 0) return direct;
  
  // Replace connectors
  text = text.replace(/ et /g,' ').replace(/-/g,' ');
  
  let total = 0, current = 0;
  const words = text.split(/\s+/);
  for (let w of words) {
    if (wordMap[w] !== undefined) {
      const v = wordMap[w];
      if (v === 1000 || v === 1000000) {
        if (current === 0) current = 1;
        total += current * v;
        current = 0;
      } else if (v === 100) {
        current = current === 0 ? 100 : current * 100;
      } else {
        current += v;
      }
    }
  }
  total += current;
  return total > 0 ? total : null;
}

// ─── Voice Recognition ────────────────────────────────────────────────────────
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.continuous = false;
  r.interimResults = true;
  r.lang = 'ar-MA';
  return r;
}

function startVoice(target) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Reconnaissance vocale non disponible sur ce navigateur', 'error'); return; }
  
  if (recognition) { recognition.abort(); recognition = null; }

  activeVoiceTarget = target;
  recognition = setupRecognition();

  const btn = target === 'name' ? document.getElementById('mic-name')
            : target === 'price' ? document.getElementById('mic-price')
            : document.getElementById('search-mic-btn');
  
  const labelEl = target === 'name' ? document.getElementById('mic-name-label')
                : target === 'price' ? document.getElementById('mic-price-label')
                : null;

  btn.classList.add('listening');
  if (labelEl) labelEl.textContent = '🎙️ En écoute...';

  recognition.onresult = (e) => {
    const transcript = Array.from(e.results).map(r => r[0].transcript).join('');
    
    if (target === 'name') {
      document.getElementById('transcript-name').textContent = transcript;
      document.getElementById('transcript-name').classList.add('has-text');
      if (e.results[0].isFinal) document.getElementById('input-name').value = transcript;
    } else if (target === 'price') {
      document.getElementById('transcript-price').textContent = transcript;
      document.getElementById('transcript-price').classList.add('has-text');
      if (e.results[0].isFinal) {
        const price = parsePrice(transcript);
        document.getElementById('price-hint').textContent = price ? `✓ Interprété : ${price} DH` : '⚠ Prix non reconnu, tapez manuellement';
        if (price) document.getElementById('input-price').value = price;
      }
    } else if (target === 'search') {
      document.getElementById('search-input').value = transcript;
      if (e.results[0].isFinal) doSearch();
    }
    updateStep();
  };

  recognition.onend = () => {
    btn.classList.remove('listening');
    if (labelEl) labelEl.textContent = target === 'name' ? 'Appuyez pour dicter le nom' : 'Appuyez pour dicter le prix';
    recognition = null;
  };

  recognition.onerror = (e) => {
    btn.classList.remove('listening');
    if (labelEl) labelEl.textContent = '⚠ Erreur, réessayez';
    recognition = null;
  };

  recognition.start();
}

// ─── Photo ────────────────────────────────────────────────────────────────────
function handlePhoto(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    currentPhoto = ev.target.result;
    const area = document.getElementById('photo-area');
    area.innerHTML = `<img src="${currentPhoto}" alt="Photo produit">`;
  };
  reader.readAsDataURL(file);
}

// ─── Save Product ─────────────────────────────────────────────────────────────
function saveProduct() {
  const name = document.getElementById('input-name').value.trim();
  const priceRaw = document.getElementById('input-price').value;
  const price = parseFloat(priceRaw);

  if (!name) { showToast('⚠ Entrez le nom du produit', 'error'); return; }
  if (!priceRaw || isNaN(price) || price <= 0) { showToast('⚠ Entrez un prix valide', 'error'); return; }

  const product = {
    id: Date.now(),
    name,
    price,
    photo: currentPhoto || null,
    date: new Date().toLocaleDateString('fr-FR')
  };

  products.unshift(product);
  localStorage.setItem('monstock_products', JSON.stringify(products));
  showToast(`✅ "${name}" ajouté — ${price} DH`, 'success');
  resetForm();
  updateBadge();
}

function resetForm() {
  document.getElementById('input-name').value = '';
  document.getElementById('input-price').value = '';
  document.getElementById('transcript-name').textContent = 'En attente...';
  document.getElementById('transcript-name').classList.remove('has-text');
  document.getElementById('transcript-price').textContent = 'En attente...';
  document.getElementById('transcript-price').classList.remove('has-text');
  document.getElementById('price-hint').textContent = '';
  document.getElementById('photo-input').value = '';
  document.getElementById('photo-area').innerHTML = `
    <div class="photo-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
      <span>Ajouter une photo</span>
    </div>`;
  currentPhoto = null;
  updateStep();
}

function updateFromInput(field) { updateStep(); }
function updateStep() {
  const hasName = document.getElementById('input-name').value.trim().length > 0;
  const hasPrice = document.getElementById('input-price').value.length > 0;
  document.getElementById('step1').className = 'step ' + (hasName ? 'done' : 'active');
  document.getElementById('step2').className = 'step ' + (hasPrice ? 'done' : hasName ? 'active' : '');
  document.getElementById('step3').className = 'step ' + (currentPhoto ? 'done' : hasPrice ? 'active' : '');
}

// ─── Search ───────────────────────────────────────────────────────────────────
function doSearch() {
  const q = document.getElementById('search-input').value.trim().toLowerCase();
  const container = document.getElementById('search-results');
  if (!q) { container.innerHTML = ''; return; }
  
  const results = products.filter(p => p.name.toLowerCase().includes(q));
  renderProducts(results, container, q);
}

function renderProducts(list, container, highlight) {
  if (list.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <p>Aucun produit trouvé</p>
    </div>`;
    return;
  }
  container.innerHTML = list.map(p => {
    const nameHtml = highlight
      ? p.name.replace(new RegExp(`(${highlight})`, 'gi'), '<mark style="background:rgba(233,69,96,0.25);color:var(--text);border-radius:3px;padding:0 2px">$1</mark>')
      : p.name;
    const thumb = p.photo
      ? `<img src="${p.photo}" alt="">`
      : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" width="24" height="24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`;
    return `<div class="product-card" data-id="${p.id}">
      <div class="product-thumb">${thumb}</div>
      <div class="product-info">
        <div class="product-name">${nameHtml}</div>
        <div class="product-price">${p.price.toLocaleString('fr-MA')} DH</div>
        <div class="product-date">${p.date}</div>
      </div>
      <div class="product-delete" data-del="${p.id}">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </div>
    </div>`;
  }).join('');
}

function deleteProduct(id, e) {
  e.stopPropagation();
  if (!confirm('Supprimer ce produit ?')) return;
  products = products.filter(p => p.id !== id);
  localStorage.setItem('monstock_products', JSON.stringify(products));
  showToast('Produit supprimé', '');
  updateBadge();
  if (document.getElementById('page-list').classList.contains('active')) renderAll();
  if (document.getElementById('page-search').classList.contains('active')) doSearch();
}

function renderAll() {
  const container = document.getElementById('all-products');
  if (products.length === 0) {
    container.innerHTML = `<div class="empty">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-4 0v2"/><path d="M8 7V5a2 2 0 0 0-4 0v2"/></svg>
      <p>Votre stock est vide.<br>Commencez par ajouter un produit !</p>
    </div>`;
    return;
  }
  renderProducts(products, container, '');
}

function updateBadge() {
  document.getElementById('count-badge').textContent = `${products.length} produit${products.length !== 1 ? 's' : ''}`;
}

// ─── Tabs ─────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + tab).classList.add('active');
  document.querySelectorAll('nav button')[['add','search','list'].indexOf(tab)].classList.add('active');
  if (tab === 'list') renderAll();
  if (tab === 'search') document.getElementById('search-input').focus();
}

// ─── Modal ────────────────────────────────────────────────────────────────────
let modalProductId = null;

function openModal(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  modalProductId = id;

  document.getElementById('modal-name').textContent = p.name;
  document.getElementById('modal-price').innerHTML = `${p.price.toLocaleString('fr-MA')} <span>DH</span>`;
  document.getElementById('modal-date').textContent = `Ajouté le ${p.date}`;

  const photoWrap = document.getElementById('modal-photo-wrap');
  if (p.photo) {
    photoWrap.innerHTML = `<img class="modal-photo" src="${p.photo}" alt="${p.name}">`;
  } else {
    photoWrap.innerHTML = `<div class="modal-photo-placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    </div>`;
  }

  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e && e.target !== document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  modalProductId = null;
}

function deleteFromModal() {
  if (!modalProductId) return;
  if (!confirm('Supprimer ce produit ?')) return;
  products = products.filter(p => p.id !== modalProductId);
  localStorage.setItem('monstock_products', JSON.stringify(products));
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  modalProductId = null;
  showToast('Produit supprimé', '');
  updateBadge();
  if (document.getElementById('page-list').classList.contains('active')) renderAll();
  if (document.getElementById('page-search').classList.contains('active')) doSearch();
}

// close on back button (Android)
window.addEventListener('popstate', () => {
  if (document.getElementById('modal-overlay').classList.contains('open')) {
    document.getElementById('modal-overlay').classList.remove('open');
    document.body.style.overflow = '';
    modalProductId = null;
  }
});

// ─── Toast ────────────────────────────────────────────────────────────────────
function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast' + (type ? ' ' + type : '');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

updateBadge();
updateStep();
</script>
</body>
</html>
